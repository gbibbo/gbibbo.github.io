name: Update assistant knowledge

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/update-assistant-knowledge.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add current profile cards to assistant knowledge
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/data/assistantKnowledge.ts')
          text = path.read_text(encoding='utf-8')

          cards_section = '''## Current rotating profile cards
The homepage currently shows four visible cards below Gabriel's profile photo. They rotate through the following sixteen approved card texts. If asked what the profile cards say, use exactly this list. Do not present the 9/10 MSc thesis grade as a headline profile card.

1. Title: 10 años / 10 years. Support line: De firmware embebido a research en audio ML.
2. Title: Bang & Olufsen. Support line: 4 años de C/C++ embebido en productos que se enviaron.
3. Title: Surrey. Support line: 3 años Research Engineer · EPSRC AI for Sound.
4. Title: 13 papers. Support line: Peer-reviewed: ICASSP, WASPAA, CHiME, AES.
5. Title: Producción / Ships. Support line: Features vivos en pipelines de audio de clientes.
6. Title: Edge. Support line: Audio ML en tiempo real sobre hardware real.
7. Title: Full stack. Support line: Del notebook al servicio: FastAPI, Docker, CI.
8. Title: Open source. Support line: Repos, datasets y demos que cualquiera puede correr.
9. Title: Google · KPMG. Support line: Soporte Tier 3 y auditoría IT en entornos enterprise.
10. Title: Privacidad / Privacy. Support line: Speech removal antes de publicar cualquier audio.
11. Title: 4 países / 4 countries. Support line: Uruguay, España, Reino Unido, Países Bajos.
12. Title: Mentoría / Mentoring. Support line: Supervisé tesis y formé programadores entrantes.
13. Title: MSc + BSc. Support line: Sound & Music Computing (UPF) · Eléctrica (UdelaR).
14. Title: Visa UE / EU work. Support line: Ciudadano italiano, con base en Montevideo.
15. Title: ES · EN C1. Support line: Trabajo remoto diario con equipos de UK y la UE.
16. Title: DJ. Support line: El oído detrás de la investigación.

'''

          if '## Current rotating profile cards' not in text:
              anchor = '## Contact\n'
              text = text.replace(anchor, cards_section + anchor)

          note = 'Do not present the MSc thesis grade as a headline profile card. The rotating profile cards no longer include the 9/10 thesis-grade item. The thesis grade remains a formal education detail only when a user specifically asks about education or the master thesis.\n\n'
          if 'Do not present the MSc thesis grade as a headline profile card.' not in text:
              text = text.replace('## Core positioning\n', note + '## Core positioning\n')

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit assistant knowledge update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/data/assistantKnowledge.ts
          git commit -m 'Update profile assistant knowledge with current cards'
          git push
